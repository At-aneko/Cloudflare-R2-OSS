name = "aneko-r2-oss"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "your-bucket-name"

[vars]
ACCESS_CODE = "admin123"
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000AA"

[build]
command = "cd ../frontend && npm install && npm run build"

[site]
bucket = "../frontend/dist"