# Cloudflare Workers 名称
name = "aneko-r2-oss"
# 入口文件
main = "src/index.ts"
# 兼容日期
compatibility_date = "2024-12-01"

# R2 存储桶绑定
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "disk"  # 替换为你的 R2 桶名称

# 环境变量
[vars]
ACCESS_CODE = "Gq210603"           # 管理员访问码，部署前修改
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000AA"  # Turnstile 密钥，部署前替换

# 构建命令（部署前自动构建前端）
[build]
command = "cd ../frontend && npm install && npm run build"

# 静态站点目录（前端构建产物）
[site]
bucket = "../frontend/dist"